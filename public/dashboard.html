<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Blog Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-journal-text me-2"></i>BlogSpace</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center" id="navLinks">
                    <!-- Dynamic Auth Links -->
                </ul>
                <button class="btn btn-sm btn-outline-secondary ms-3" id="themeToggle">
                    <i class="bi bi-moon-stars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-5 pt-5 pb-5">
        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h2 class="fw-bold mb-0">My Dashboard</h2>
                <p class="text-muted" id="userGreeting">Welcome back!</p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a href="/editor.html" class="btn btn-primary rounded-pill px-4"><i class="bi bi-pencil me-1"></i> Create New Post</a>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-center p-4">
                    <h3 class="fw-bold text-primary" id="statPosts">-</h3>
                    <p class="text-muted mb-0">Total Posts</p>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-light text-muted">
                            <tr>
                                <th class="border-0 ps-4 py-3">Title</th>
                                <th class="border-0 py-3">Category</th>
                                <th class="border-0 py-3">Date</th>
                                <th class="border-0 py-3">Views</th>
                                <th class="border-0 text-end pe-4 py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="myPostsList">
                            <tr><td colspan="5" class="text-center py-4">Loading your posts...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('userGreeting').textContent = `Welcome back, ${user.username}!`;
            loadMyPosts(user.id);
        });

        const loadMyPosts = async (authorId) => {
            try {
                const data = await apiFetch(`/posts?authorId=${authorId}`);
                document.getElementById('statPosts').textContent = data.total;
                
                const tbody = document.getElementById('myPostsList');
                if (data.posts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">You haven\'t created any posts yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.posts.map(post => `
                    <tr>
                        <td class="ps-4 py-3">
                            <a href="/post.html?id=${post.id}" class="text-decoration-none fw-bold text-dark d-block text-truncate" style="max-width: 300px;">${post.title}</a>
                        </td>
                        <td class="py-3"><span class="badge bg-secondary rounded-pill">${post.category || 'General'}</span></td>
                        <td class="py-3 text-muted">${formatDate(post.createdAt)}</td>
                        <td class="py-3 text-muted">${post.views}</td>
                        <td class="text-end pe-4 py-3">
                            <a href="/editor.html?id=${post.id}" class="btn btn-sm btn-outline-primary rounded-pill"><i class="bi bi-pencil"></i></a>
                            <button class="btn btn-sm btn-outline-danger rounded-pill ms-1" onclick="deletePost('${post.id}')"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        const deletePost = async (id) => {
            if (!confirm('Are you sure you want to delete this post?')) return;
            try {
                await apiFetch(`/posts/${id}`, { method: 'DELETE' });
                showToast('Post deleted successfully');
                loadMyPosts(getUser().id);
            } catch (error) {
                showToast(error.message, 'error');
            }
        };
    </script>
</body>
</html>
