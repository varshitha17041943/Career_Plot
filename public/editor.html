<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - Blog Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-journal-text me-2"></i>BlogSpace</a>
            <div class="ms-auto d-flex align-items-center">
                <button class="btn btn-primary rounded-pill px-4" id="saveBtn">Publish Post</button>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card border-0 shadow-sm p-4">
                    <form id="editorForm">
                        <input type="text" class="form-control form-control-lg border-0 fw-bold fs-2 mb-3" id="title" placeholder="Post Title" required autofocus style="box-shadow: none;">
                        <select class="form-select border-0 text-muted mb-3 w-auto" id="category" style="box-shadow: none; font-size: 1.1rem;">
                            <option value="Technology">Technology</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Education">Education</option>
                            <option value="Health">Health</option>
                            <option value="General">General</option>
                        </select>
                        <textarea class="form-control border-0" id="content" rows="15" placeholder="Write your story here..." required style="box-shadow: none; font-size: 1.1rem; resize: none;"></textarea>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!getUser()) {
                window.location.href = '/login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                document.title = 'Edit Post - Blog Platform';
                document.getElementById('saveBtn').textContent = 'Update Post';
                try {
                    const post = await apiFetch(`/posts/${id}`);
                    document.getElementById('title').value = post.title;
                    document.getElementById('category').value = post.category || 'General';
                    document.getElementById('content').value = post.content;
                } catch (error) {
                    showToast('Failed to load post', 'error');
                }
            }

            document.getElementById('saveBtn').addEventListener('click', async () => {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const content = document.getElementById('content').value;

                if (!title || !content) {
                    showToast('Title and content are required', 'error');
                    return;
                }

                try {
                    const method = id ? 'PUT' : 'POST';
                    const endpoint = id ? `/posts/${id}` : '/posts';
                    
                    const res = await apiFetch(endpoint, {
                        method,
                        body: JSON.stringify({ title, category, content })
                    });
                    
                    showToast('Post saved successfully!');
                    setTimeout(() => window.location.href = `/post.html?id=${res.id}`, 1000);
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
