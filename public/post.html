<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Blog Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="bi bi-journal-text me-2"></i>BlogSpace</a>
            <div class="ms-auto d-flex align-items-center" id="navLinks">
                <!-- Nav Links -->
            </div>
            <button class="btn btn-sm btn-outline-secondary ms-3" id="themeToggle">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </nav>

    <main class="container mt-5 pt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8" id="postContent">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let currentPost = null;

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) {
                window.location.href = '/';
                return;
            }
            loadPost(id);
        });

        const loadPost = async (id) => {
            try {
                currentPost = await apiFetch(`/posts/${id}`);
                renderPost();
            } catch (error) {
                document.getElementById('postContent').innerHTML = `<div class="alert alert-danger">Post not found.</div>`;
            }
        };

        const renderPost = () => {
            const user = getUser();
            const isLiked = user && currentPost.likes.some(l => l.userId === user.id);
            
            let html = `
                <div class="card border-0 shadow-sm p-4 p-md-5 mb-5">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="d-flex align-items-center">
                            <img src="${currentPost.author.avatar}" class="avatar-md me-3" alt="Author">
                            <div>
                                <h5 class="mb-0 fw-bold">${currentPost.author.username}</h5>
                                <small class="text-muted">${formatDate(currentPost.createdAt)} · <i class="bi bi-eye-fill ms-2"></i> ${currentPost.views} views</small>
                            </div>
                        </div>
                        <span class="badge bg-primary rounded-pill px-3 py-2">${currentPost.category || 'General'}</span>
                    </div>
                    
                    <h1 class="display-5 fw-bold mb-4">${currentPost.title}</h1>
                    
                    <div class="fs-5 text-dark" style="line-height: 1.8; white-space: pre-wrap;">${currentPost.content}</div>
                    
                    <div class="d-flex align-items-center mt-5 pt-4 border-top">
                        <button class="btn btn-${isLiked ? 'danger' : 'outline-danger'} rounded-pill me-3 px-4 py-2" onclick="toggleLike('${currentPost.id}')">
                            <i class="bi bi-heart${isLiked ? '-fill' : ''} me-2"></i> ${currentPost.likes.length} Likes
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4">
                    <h4 class="fw-bold mb-4">Comments (${currentPost.comments.length})</h4>
                    
                    ${user ? `
                        <form id="commentForm" class="mb-5">
                            <div class="d-flex">
                                <img src="${user.avatar}" class="avatar-sm me-3" alt="Me">
                                <div class="flex-grow-1">
                                    <textarea class="form-control bg-light border-0 mb-2" id="commentContent" rows="3" placeholder="Add a comment..." required></textarea>
                                    <button type="submit" class="btn btn-primary rounded-pill px-4">Post Comment</button>
                                </div>
                            </div>
                        </form>
                    ` : `<div class="alert alert-info border-0 rounded-3 mb-5">Please <a href="/login.html" class="fw-bold">login</a> to leave a comment.</div>`}

                    <div id="commentsList">
                        ${currentPost.comments.map(c => `
                            <div class="d-flex mb-4">
                                <img src="${c.user.avatar}" class="avatar-sm me-3 mt-1" alt="User">
                                <div class="flex-grow-1">
                                    <div class="bg-light p-3 rounded-3">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h6 class="mb-0 fw-bold">${c.user.username}</h6>
                                            ${user && (user.id === c.user.id || user.role === 'admin') ? `
                                                <button class="btn btn-sm text-danger p-0" onclick="deleteComment('${c.id}')"><i class="bi bi-trash"></i></button>
                                            ` : ''}
                                        </div>
                                        <p class="mb-0 text-dark">${c.content}</p>
                                    </div>
                                    <small class="text-muted ms-2 mt-1 d-block">${formatDate(c.createdAt)}</small>
                                </div>
                            </div>
                        `).join('')}
                        ${currentPost.comments.length === 0 ? '<p class="text-muted text-center">No comments yet. Be the first!</p>' : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('postContent').innerHTML = html;
            document.title = `${currentPost.title} - Blog Platform`;

            if (user) {
                document.getElementById('commentForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const content = document.getElementById('commentContent').value;
                    try {
                        await apiFetch('/comments', {
                            method: 'POST',
                            body: JSON.stringify({ postId: currentPost.id, content })
                        });
                        loadPost(currentPost.id);
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                });
            }
        };

        const toggleLike = async (id) => {
            if (!getUser()) {
                window.location.href = '/login.html';
                return;
            }
            try {
                await apiFetch(`/posts/${id}/like`, { method: 'POST' });
                loadPost(id);
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        const deleteComment = async (id) => {
            if (!confirm('Delete this comment?')) return;
            try {
                await apiFetch(`/comments/${id}`, { method: 'DELETE' });
                loadPost(currentPost.id);
            } catch (error) {
                showToast(error.message, 'error');
            }
        };
    </script>
</body>
</html>
